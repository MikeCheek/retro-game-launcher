version: "3.8"

services:
  retro-launcher:
    build: .
    ports:
      - "3333:3333"
    volumes:
      - ./roms:/app/roms
      - ./data.db:/app/data.db
    environment:
      NODE_ENV: production
      PORT: 3333
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3333/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
